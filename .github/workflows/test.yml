name: 补丁测试

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false
      - name: 检查安装脚本语法
        run: bash -n install.sh
      - name: 获取上游源码
        run: git clone --branch v1.13 --depth 1 https://github.com/cedar2025/xboard-node.git upstream
      - name: 应用补丁
        run: git -C upstream apply ../fix-userdiff.patch
      - name: 运行回归测试
        working-directory: upstream
        run: go test ./internal/kernel ./internal/kernel/xray ./internal/service
