name: Test patch

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false
      - name: Fetch upstream source
        run: git clone --branch v1.13 --depth 1 https://github.com/cedar2025/xboard-node.git upstream
      - name: Apply patch
        run: git -C upstream apply ../fix-userdiff.patch
      - name: Run regression tests
        working-directory: upstream
        run: go test ./internal/kernel ./internal/kernel/xray ./internal/service
